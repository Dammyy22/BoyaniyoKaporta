<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoTextile - Boyanıyo Kaporta</title>
    <style>
        /* CSS Başlangıcı */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        nav ul {
            list-style: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin: 0 15px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .hero {
            text-align: center;
            padding: 50px 20px;
            background-color: #fff;
        }
        .call-to-action {
            text-align: center;
            padding: 40px;
            background-color: #e8e8e8;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        /* CSS Sonu */
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Anasayfa</a></li>
                <li><a href="galeri.html">Eskisi / Yenisi</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>PromoTextile</h1>
            <p>16 Yıllık Tecrübe ile Yanınızdayız.</p>
        </section>

        <section class="call-to-action">
            <h2>Dönüşüm Projelerimiz</h2>
            <p>Yaptığımız uygulamaları görmek için galerimize göz atın.</p>
            <a href="galeri.html" class="btn">Eskisi / Yenisi Galerisini Gör</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PromoTextile - Tüm Hakları Saklıdır.</p>
    </footer>

</body>
</html>
