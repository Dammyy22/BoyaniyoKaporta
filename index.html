<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boyanıyo Kaporta – Aracınız İlk Günkü Parlaklığına Dönüşsün</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0F1923; --navy-mid: #162130; --orange: #FF6B1A; --orange-dark: #D94F00; --cream: #F5F0E8; --steel: #8A9BA8; --white: #FFFFFF; --card-bg: #1A2838; }
    body { background: var(--navy); color: var(--cream); font-family: 'Inter', sans-serif; line-height: 1.6; }
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 68px; background: rgba(15,25,35,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,107,26,0.15); }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 38px; height: 38px; background: var(--orange); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: var(--white); }
    nav { display: flex; align-items: center; gap: 32px; }
    nav a { color: var(--steel); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--orange); }
    .nav-cta { background: var(--orange); color: var(--white) !important; padding: 8px 18px; border-radius: 4px; font-weight: 600 !important; }
    #hero { min-height: 100vh; display: flex; align-items: center; padding: 68px 5% 0; position: relative; overflow: hidden; }
    .hero-content { z-index: 2; max-width: 680px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 7vw, 6rem); color: var(--white); margin-bottom: 20px; line-height: 1; }
    h1 em { font-style: normal; color: var(--orange); }
    .btn-primary { display: inline-block; background: var(--orange); color: white; padding: 14px 28px; border-radius: 4px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>

<header>
  <a href="#" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M3 10.5L4.5 6h15l1.5 4.5M3 10.5v5h1.5M3 10.5H1.5M20.5 10.5v5H19M20.5 10.5H22M4.5 15.5a2 2 0 1 0 4 0 2 2 0 0 0-4 0m11 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0M6.5 15.5h7"/></svg></div>
    <span class="logo-text">BOYANIYO<span> KAPORTA</span></span>
  </a>
  <nav>
    <a href="#hizmetler">Hizmetlerimiz</a>
    <a href="galeri.html" class="active">Öncesi/Sonrası</a>
    <a href="#iletisim">İletişim</a>
    <a href="#" class="nav-cta">Teklif Al</a>
  </nav>
</header>

<section id="hero">
  <div class="hero-content">
    <h1>Aracınız <em>İlk Günkü</em><br>Parlaklığına<br>Dönüşsün</h1>
    <p style="color:var(--steel); margin-bottom:30px;">Profesyonel fırın boya ve hasar onarımı.</p>
    <a href="galeri.html" class="btn-primary">Çalışmalarımızı Gör</a>
  </div>
</section>

</body>
</html>
